name: Build & release midex-fw-upload

# Builds the cross-platform libusb firmware uploader and attaches standalone
# (statically linked libusb) binaries to a GitHub (pre)release.
#
# Triggers:
#   * push a tag matching v*        -> publishes a release for that tag
#     (marked pre-release if the tag is a pre-release semver, e.g. v1.2.0-rc1)
#   * manual run (workflow_dispatch) -> builds the binaries; publishes a
#     pre-release only if you supply a tag name.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/release name to publish (leave empty to only build artifacts)'
        required: false
        default: ''
      prerelease:
        description: 'Mark the release as a pre-release'
        type: boolean
        default: true

permissions:
  contents: read

# A pinned libusb release built static-only on every platform, so the bare
# -lusb-1.0 always resolves to the archive (no shared lib to win the link).
env:
  LIBUSB_VERSION: '1.0.27'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
          - name: linux-arm64
            os: ubuntu-22.04-arm
          # One universal2 binary (x86_64 + arm64). GitHub's Intel macOS runner
          # (macos-13) is being retired and the rest are Apple Silicon, so we
          # cross-build both slices on arm64 and ship a single fat binary.
          - name: macos-universal
            os: macos-14
          - name: windows-x86_64
            os: windows-latest
            msys: true

    defaults:
      run:
        # Windows steps run in the MSYS2 MINGW64 shell; everyone else uses bash.
        shell: ${{ matrix.msys && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config curl

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install cmake pkg-config

      - name: Install build tools (Windows / MSYS2)
        if: matrix.msys
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            make
            tar
            curl

      - name: Build static libusb ${{ env.LIBUSB_VERSION }}
        run: |
          set -euo pipefail
          prefix="$PWD/libusb-prefix"
          curl -L -o libusb.tar.bz2 \
            "https://github.com/libusb/libusb/releases/download/v${LIBUSB_VERSION}/libusb-${LIBUSB_VERSION}.tar.bz2"
          tar xf libusb.tar.bz2
          cd "libusb-${LIBUSB_VERSION}"
          # Build a universal (fat) static lib on macOS so the tool can be too.
          if [ "${{ runner.os }}" = "macOS" ]; then
            export CFLAGS="${CFLAGS:-} -arch x86_64 -arch arm64"
          fi
          ./configure --prefix="$prefix" --disable-shared --enable-static --disable-udev
          make -j
          make install
          echo "LIBUSB_PREFIX=$prefix" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Configure & build midex-fw-upload
        run: |
          set -euo pipefail
          # MSYS2's cmake defaults to the Ninja generator (Ninja ships with the
          # mingw cmake package), so we don't override the generator anywhere.
          extra_args=()
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Also statically link libgcc/winpthread so the .exe is standalone.
            extra_args+=(-DCMAKE_EXE_LINKER_FLAGS=-static)
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Build a universal2 binary matching the fat libusb above.
            extra_args+=("-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64")
          fi
          cmake -S host -B host/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMIDEX_STATIC_LIBUSB=ON \
            -DCMAKE_PREFIX_PATH="$LIBUSB_PREFIX" \
            "${extra_args[@]}"
          cmake --build host/build --config Release

      - name: Smoke test (binary runs, no shared libusb)
        run: |
          set -uo pipefail
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin="host/build/midex-fw-upload.exe"
          else
            bin="host/build/midex-fw-upload"
          fi
          # No firmware arg -> prints usage and exits non-zero; this proves the
          # binary loads and resolves its symbols without an external libusb.
          out="$("$bin" 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "usage:"
          if [ "${{ runner.os }}" = "Linux" ]; then
            ldd "$bin" || true
            ! ldd "$bin" | grep -qi 'libusb' || { echo "ERROR: libusb linked dynamically"; exit 1; }
          elif [ "${{ runner.os }}" = "macOS" ]; then
            otool -L "$bin" || true
            echo "architectures: $(lipo -archs "$bin")"
            lipo -archs "$bin" | grep -q x86_64
            lipo -archs "$bin" | grep -q arm64
            ! otool -L "$bin" | grep -qi 'libusb' || { echo "ERROR: libusb linked dynamically"; exit 1; }
          fi

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp host/build/midex-fw-upload.exe "dist/midex-fw-upload-${{ matrix.name }}.exe"
          else
            cp host/build/midex-fw-upload "dist/midex-fw-upload-${{ matrix.name }}"
          fi
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: midex-fw-upload-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish when we have a tag: a v* tag push, or a manual run with a tag.
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release metadata
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            # Pre-release semver (contains a hyphen, e.g. v1.2.0-rc1).
            case "$tag" in
              *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
              *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: true
