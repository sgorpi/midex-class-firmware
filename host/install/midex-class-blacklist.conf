# Installed only while the class-compliant firmware path is active
# (host/midex-fwctl.sh class). The in-tree snd_usb_midex driver from the parent
# project also claims the loader-PID MIDEX and uploads the *stock* firmware; with
# both active they race for the device. Blacklisting keeps it out of the way so
# our uploader wins and the device comes up as a standard USB-MIDI class device
# (claimed by snd-usb-audio, no custom driver).
#
# `host/midex-fwctl.sh stock` removes this file again.
blacklist snd_usb_midex
